<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="script.js"></script>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="../frontend/dashboard.html" style="color: #1e3c72; text-decoration: none; font-size: 14px; font-weight: bold;">[View Intrusion Logs Dashboard]</a>
            <br>
            <a href="query.html" style="color: #1e3c72; text-decoration: none; font-size: 14px; font-weight: bold;">[Test SQL Injection]</a>
        </div>

        <form id="loginForm" class="login-form">
            <label for="user">Username</label>
            <input type="text" id="user" name="user" placeholder="Enter username" required>

            <label for="pswd">Password</label>
            <input type="password" id="pswd" name="pswd" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
